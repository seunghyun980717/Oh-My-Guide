# =============================================================================
# Oh! My Guide — 로컬 단일 컴퓨터 통합 실행용 docker-compose
# =============================================================================
#
# 사전 준비:
#   1. cp exec/.env.example exec/.env  후 값 채우기
#   2. docker network create local-network
#
# 빌드 & 실행:
#   docker compose -f exec/docker-compose.local.yml up -d --build
#
# 종료 (볼륨 포함 전체 삭제):
#   docker compose -f exec/docker-compose.local.yml down -v
#
# =============================================================================

services:

  # ── PostgreSQL (PostGIS) ────────────────────────────────────────────────────
  postgresql:
    image: postgis/postgis:16-3.4
    container_name: postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-network

  # ── Kafka (KRaft 모드) ───────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    ports:
      - "9092:9092"   # Docker 내부 (컨테이너 → 컨테이너)
      - "9094:9094"   # 외부 접근용 (IDE에서 localhost:9094)
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - local-network

  # ── HDFS NameNode ───────────────────────────────────────────────────────────
  namenode:
    image: apache/hadoop:3
    container_name: namenode
    hostname: namenode
    user: root
    environment:
      - HADOOP_HOME=/opt/hadoop
    command: >
      sh -c "
        mkdir -p /opt/hadoop/data/nameNode /opt/hadoop/data/tmp &&
        chown -R hadoop:hadoop /opt/hadoop/data &&
        if [ ! -d /opt/hadoop/data/nameNode/current ]; then
          su hadoop -c 'hdfs namenode -format -nonInteractive';
        fi &&
        su hadoop -c 'hdfs namenode'
      "
    ports:
      - "9870:9870"   # HDFS Web UI
      - "9000:9000"   # HDFS RPC
      - "8020:8020"   # IPC
    volumes:
      - namenode_data:/opt/hadoop/data/nameNode
      - ../infra/data-server/hadoop-config:/opt/hadoop/etc/hadoop
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9870 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - local-network

  # ── HDFS DataNode ───────────────────────────────────────────────────────────
  datanode:
    image: apache/hadoop:3
    container_name: datanode
    hostname: datanode
    user: root
    environment:
      - HADOOP_HOME=/opt/hadoop
      - DATANODE_HOSTNAME=datanode   # 같은 네트워크: 컨테이너명으로 통신
    command: >
      sh -c "
        mkdir -p /opt/hadoop/data/dataNode &&
        chown -R hadoop:hadoop /opt/hadoop/data &&
        su -m hadoop -c 'hdfs datanode'
      "
    ports:
      - "9864:9864"
      - "9866:9866"
      - "9867:9867"
    volumes:
      - datanode_data:/opt/hadoop/data/dataNode
      - ../infra/data-server/hadoop-config:/opt/hadoop/etc/hadoop
    depends_on:
      namenode:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9864 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - local-network

  # ── Spark Master ────────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=18080
      - SPARK_MASTER_REST_PORT=6066
    ports:
      - "18080:18080"   # Spark Web UI
      - "7077:7077"
      - "6066:6066"
    volumes:
      - ../infra/data-server/spark-jobs:/opt/spark-jobs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - local-network

  # ── Spark Worker ────────────────────────────────────────────────────────────
  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    hostname: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_WEBUI_PORT=8081
    ports:
      - "8081:8081"   # Worker Web UI
    volumes:
      - ../infra/data-server/spark-jobs:/opt/spark-jobs
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - local-network

  # ── Apache Livy ─────────────────────────────────────────────────────────────
  livy:
    build:
      context: ../infra/data-server/livy
    container_name: livy
    hostname: livy
    ports:
      - "8998:8998"
    environment:
      - SPARK_HOME=/opt/spark
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
      - LIVY_SERVER_JAVA_OPTS=--add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
    volumes:
      - ../infra/data-server/spark-jobs:/opt/spark-jobs
      - ../infra/data-server/hadoop-config:/opt/hadoop/etc/hadoop
      - ../infra/data-server/livy/livy.conf:/opt/livy/conf/livy.conf
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - local-network

  # ── FastAPI (AI 서버) ────────────────────────────────────────────────────────
  fastapi:
    build:
      context: ../ai
    image: oh-my-guide-ai:latest
    container_name: fastapi
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - GMS_KEY=${GMS_KEY}
      - GMS_BASE_URL=${GMS_BASE_URL:-https://gms.ssafy.io/gmsapi}
    ports:
      - "8000:8000"
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - local-network

  # ── Spring Boot ─────────────────────────────────────────────────────────────
  spring-boot:
    build:
      context: ../backend
    image: oh-my-guide-backend:latest
    container_name: spring-boot
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_GROUP_ID=oh-my-guide
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - TOKEN_SECRET=${TOKEN_SECRET}
      - TOUR_API_KEY=${TOUR_API_KEY}
      - AI_SERVER_URL=http://fastapi:8000
      - HDFS_HOST=namenode
      - HDFS_PORT=9000
      - HDFS_USER=root
      - LIVY_URL=http://livy:8998
      - SPARK_DB_HOST=postgresql
    ports:
      - "8080:8080"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /actuator/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q UP'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - local-network

  # ── Kafka Consumers ─────────────────────────────────────────────────────────
  user-visited-consumer:
    image: oh-my-guide-backend:latest
    container_name: user-visited-consumer
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_GROUP_ID=oh-my-guide
      - HDFS_HOST=namenode
      - HDFS_PORT=9000
      - HDFS_USER=root
      - TOKEN_SECRET=${TOKEN_SECRET}
      - TOUR_API_KEY=${TOUR_API_KEY}
      - SPRING_PROFILES_ACTIVE=user-visited-consumer
    depends_on:
      spring-boot:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - local-network

  attractions-route-consumer:
    image: oh-my-guide-backend:latest
    container_name: attractions-route-consumer
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_GROUP_ID=oh-my-guide
      - HDFS_HOST=namenode
      - HDFS_PORT=9000
      - HDFS_USER=root
      - TOKEN_SECRET=${TOKEN_SECRET}
      - TOUR_API_KEY=${TOUR_API_KEY}
      - SPRING_PROFILES_ACTIVE=attractions-route-consumer
    depends_on:
      spring-boot:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - local-network

  hdfs-log-consumer:
    image: oh-my-guide-backend:latest
    container_name: hdfs-log-consumer
    environment:
      - DB_HOST=postgresql
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB}
      - DB_USERNAME=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_GROUP_ID=oh-my-guide
      - HDFS_HOST=namenode
      - HDFS_PORT=9000
      - HDFS_USER=root
      - TOKEN_SECRET=${TOKEN_SECRET}
      - TOUR_API_KEY=${TOUR_API_KEY}
      - SPRING_PROFILES_ACTIVE=hdfs-log-consumer
    depends_on:
      spring-boot:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - local-network

  # ── 모니터링 ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../infra/application-server/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: unless-stopped
    networks:
      - local-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../infra/application-server/grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    networks:
      - local-network

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ../infra/application-server/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - local-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgresql:5432/${POSTGRES_DB}?sslmode=disable
    restart: unless-stopped
    networks:
      - local-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - local-network

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: kafka-exporter
    command:
      - '--kafka.server=kafka:9092'
    restart: unless-stopped
    networks:
      - local-network

# ── 볼륨 ─────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  namenode_data:
  datanode_data:
  prometheus_data:
  grafana_data:
  loki_data:

# ── 네트워크 ──────────────────────────────────────────────────────────────────
networks:
  local-network:
    external: true
