# 1. 파일 맨 위(server 블록 밖)에 이 map 설정을 추가하세요.
# 웹소켓 연결 시 Upgrade 헤더에 따라 Connection 헤더를 동적으로 변경합니다.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ============================================================
# HTTP 서버 블록
# 역할:
#   1. Let's Encrypt 인증서 발급/갱신을 위한 challenge 경로 제공
#   2. 나머지 모든 HTTP 요청을 HTTPS로 리다이렉트
# ============================================================
server {
    listen 80;
    server_name j14e103a.p.ssafy.io;

    # certbot이 도메인 소유권 검증 시 사용하는 경로
    # certbot이 이 경로에 임시 파일을 생성하고, Let's Encrypt 서버가 접근해서 확인함
    # 컨테이너 내부 /var/www/certbot 디렉토리를 호스트와 공유 (volume mount)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 위 경로 외 모든 요청은 HTTPS로 301 영구 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS 서버 블록
# 역할: SSL 종료(termination) + 리버스 프록시
#   - 클라이언트(Android 앱)와는 HTTPS로 통신
#   - 내부 서비스(Spring Boot, FastAPI)와는 HTTP로 통신 (Docker 내부망)
#
# TODO: 인증서 발급 완료 후 아래 주석 해제
# 발급 명령어:
#   docker compose -f docker-compose.infra.yml run --rm certbot certonly \
#     --webroot --webroot-path=/var/www/certbot \
#     --email your-email@example.com --agree-tos --no-eff-email \
#     -d j14e103a.p.ssafy.io
# 발급 후: 아래 주석 해제 → docker compose ... restart nginx
# ============================================================

server {
    listen 443 ssl;
    server_name j14e103a.p.ssafy.io;

    ssl_certificate     /etc/letsencrypt/live/j14e103a.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/j14e103a.p.ssafy.io/privkey.pem;

    # SSE 전용 설정: 버퍼링 해제 + 타임아웃 연장 (Spring Boot SSE_TIMEOUT 600초에 맞춤)
    location /api/guide/sse {
        proxy_pass http://spring-boot:8080/guide/sse;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_read_timeout 620s;
        proxy_send_timeout 620s;
    }

    location /api/ {
        proxy_pass http://spring-boot:8080/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ai/ {
        proxy_pass http://fastapi:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /jenkins/ {
        proxy_pass http://jenkins:8080/jenkins/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_redirect http://jenkins:8080/jenkins/ https://$host/jenkins/;
        proxy_read_timeout 90s;
    }

    location /grafana/ {
        proxy_pass http://grafana:3000;
        
        # [수정 1] $host 대신 $http_host 사용 (Origin 에러 방지 핵심!)
        proxy_set_header Host $http_host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # [수정 2] 웹소켓 설정을 변수(map)로 처리해 더 안정적으로 변경
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # [유지] 실시간 스트리밍을 위해 버퍼링 해제
        # proxy_buffering off;

        # [수정 3] 타임아웃을 더 넉넉하게 (연결 끊김 방지)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
