<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oh My Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #E4EEFF 0%, #EEF5FF 60%, #E0EEFF 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    ::-webkit-scrollbar { display: none; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }
    @keyframes shadowPulse {
      0%, 100% { transform: scaleX(1); opacity: .6; }
      50% { transform: scaleX(.7); opacity: .25; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes gpsPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes bubblePop {
      0%   { opacity: 0; transform: scale(.85) translateY(6px); }
      70%  { transform: scale(1.03); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes screenSwitch {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 폰 프레임 ── */
    .phone {
      width: 390px;
      height: 844px;
      background: #F7FAFF;
      border-radius: 48px;
      box-shadow: 0 32px 80px rgba(91,156,246,.18), 0 4px 24px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── 배경 블롭 ── */
    .blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── 홈바 ── */
    .home-bar {
      width: 120px; height: 5px;
      background: #2D3A55;
      border-radius: 3px;
      opacity: .1;
      margin: 0 auto 20px;
      flex-shrink: 0;
    }

    /* ══════════════════
       SPLASH
    ══════════════════ */
    #splash {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 40px;
      position: relative;
      z-index: 1;
      animation: screenSwitch .5s ease-out both;
    }

    .omg-badge {
      background: #5B9CF6;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 2px;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 24px;
      animation: fadeUp .7s ease-out .0s both;
    }

    .mascot-wrap {
      animation: float 3.5s ease-in-out infinite;
      margin-bottom: 6px;
    }
    .mascot-wrap img {
      width: 220px; height: 220px;
      object-fit: contain;
      filter: drop-shadow(0 20px 40px rgba(91,156,246,.3));
    }

    .mascot-shadow {
      width: 80px; height: 12px;
      background: radial-gradient(ellipse, rgba(91,156,246,.2) 0%, transparent 70%);
      border-radius: 50%;
      margin-bottom: 36px;
      animation: shadowPulse 3.5s ease-in-out infinite;
    }

    .app-title {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -1px;
      text-align: center;
      margin-bottom: 10px;
      animation: fadeUp .7s ease-out .2s both;
    }
    .app-title .blue { color: #5B9CF6; }
    .app-title .dark { color: #2D3A55; }

    .app-subtitle {
      font-size: 14px;
      font-weight: 600;
      color: #9BAEC8;
      margin-bottom: 52px;
      animation: fadeUp .7s ease-out .35s both;
    }

    .google-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      background: #fff;
      border: 1.5px solid #E4EAF2;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #2D3A55;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,.06);
      transition: all .15s ease;
      animation: fadeUp .7s ease-out .5s both;
    }
    .google-btn:hover {
      border-color: #A8CBFF;
      box-shadow: 0 8px 24px rgba(91,156,246,.18);
      transform: translateY(-2px);
    }
    .google-btn:active { transform: none; }

    /* ══════════════════
       MAIN
    ══════════════════ */
    #main {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      animation: screenSwitch .5s ease-out both;
    }
    #main.active { display: flex; }

    .main-header {
      padding: 52px 28px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }
    .header-logo { font-size: 17px; font-weight: 900; color: #2D3A55; }
    .header-logo span { color: #5B9CF6; }

    .gps-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #EBF3FF;
      color: #5B9CF6;
      font-size: 11px;
      font-weight: 800;
      padding: 5px 11px;
      border-radius: 20px;
    }
    .gps-dot {
      width: 6px; height: 6px;
      background: #5B9CF6;
      border-radius: 50%;
      animation: gpsPulse 1.5s ease-in-out infinite;
    }

    .location-bar {
      margin: 0 28px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border-radius: 14px;
      padding: 10px 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
      position: relative;
      z-index: 1;
      font-size: 13px;
    }
    .location-name { font-weight: 700; color: #2D3A55; }
    .location-time { font-size: 11px; font-weight: 600; color: #9BAEC8; margin-left: auto; }

    /* 캐릭터 + 말풍선 */
    .character-row {
      padding: 0 28px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }
    .main-mascot {
      width: 110px; height: 110px;
      object-fit: contain;
      filter: drop-shadow(0 8px 20px rgba(91,156,246,.2));
      animation: float 3.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    .speech-bubble {
      background: #fff;
      border-radius: 20px 20px 20px 4px;
      padding: 14px 16px;
      box-shadow: 0 4px 20px rgba(91,156,246,.12);
      animation: bubblePop .5s ease-out .3s both;
      opacity: 0;
      position: relative;
      flex: 1;
      font-size: 14px;
      font-weight: 700;
      color: #2D3A55;
      line-height: 1.65;
    }
    .speech-bubble span { color: #5B9CF6; }
    .bubble-tail {
      position: absolute;
      bottom: -8px; left: 16px;
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #fff;
    }

    /* 옵션 카드 */
    .options-list {
      flex: 1;
      padding: 0 28px 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .option-card {
      background: #fff;
      border-radius: 18px;
      padding: 15px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .18s ease;
      opacity: 0;
    }
    .option-card:hover {
      transform: translateY(-2px);
    }
    .option-card.active {
      border-color: var(--accent-light);
      background: var(--bg);
    }
    .option-card.active .option-title { color: var(--accent); }
    .option-card.active .option-arrow { color: var(--accent); transform: rotate(90deg); }
    .option-card.active .option-emoji-box { transform: scale(1.1); }

    .option-emoji-box {
      width: 48px; height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      transition: transform .18s;
      background: var(--bg);
    }
    .option-title { font-size: 14px; font-weight: 800; color: #2D3A55; margin-bottom: 2px; }
    .option-desc  { font-size: 12px; font-weight: 600; color: #9BAEC8; }
    .option-arrow { font-size: 20px; font-weight: 700; color: #C5D5E8; transition: transform .2s, color .18s; }
  </style>
</head>
<body>

<div class="phone" id="phone">
  <!-- 배경 블롭 (스플래시) -->
  <div class="blob" id="blob1" style="width:320px;height:320px;background:radial-gradient(circle,#DDEEFF 0%,transparent 70%);top:-110px;right:-90px;"></div>
  <div class="blob" id="blob2" style="width:220px;height:220px;background:radial-gradient(circle,#E8F3FF 0%,transparent 70%);bottom:60px;left:-70px;"></div>

  <!-- ══ SPLASH ══ -->
  <div id="splash">
    <div class="omg-badge">OMG ✦</div>

    <div class="mascot-wrap">
      <img src="mascot.png" alt="도깨비" />
    </div>
    <div class="mascot-shadow"></div>

    <div class="app-title">
      <span class="blue">Oh My </span><span class="dark">Guide!</span>
    </div>
    <p class="app-subtitle">지금 이 순간, 딱 맞는 곳으로</p>

    <button class="google-btn" onclick="goMain()">
      <svg width="22" height="22" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Google로 시작하기
    </button>
  </div>
  <div class="home-bar" id="splash-bar"></div>

  <!-- ══ MAIN ══ -->
  <div id="main">
    <div class="blob" style="width:260px;height:260px;background:radial-gradient(circle,#DDEEFF 0%,transparent 70%);top:-80px;right:-70px;pointer-events:none;z-index:0;position:absolute;border-radius:50%;"></div>

    <div class="main-header">
      <div class="header-logo"><span>Oh My</span> Guide</div>
      <div class="gps-badge"><div class="gps-dot"></div> 위치 수신 중</div>
    </div>

    <div class="location-bar">
      <span>📍</span>
      <span class="location-name">서울 마포구 홍대입구역</span>
      <span class="location-time">방금 전</span>
    </div>

    <div class="character-row">
      <img src="mascot.png" alt="도깨비" class="main-mascot" />
      <div class="speech-bubble">
        안녕! 나는 <span>가이드 깨비깨비</span>야 👋<br />
        지금 <span>뭐가 필요해?</span>
        <div class="bubble-tail"></div>
      </div>
    </div>

    <div class="options-list" id="optionsList"></div>
    <div class="home-bar"></div>
  </div>
</div>

<script>
  const OPTIONS = [
    { emoji:"🍚", title:"근처 밥집 찾기",  desc:"지금 위치 기반 맛집 추천", bg:"#FFF4EB", accent:"#F5A623" },
    { emoji:"☕", title:"근처 카페 찾기",  desc:"분위기 좋은 카페 추천",    bg:"#EBF3FF", accent:"#5B9CF6" },
    { emoji:"🎉", title:"근처 축제/행사",  desc:"오늘 주변 이벤트 보기",    bg:"#F3EBFF", accent:"#A78BFA" },
    { emoji:"🏞️", title:"근처 여행지 보기",desc:"숨겨진 명소 발견하기",    bg:"#EBFFF4", accent:"#34D399" },
    { emoji:"🍺", title:"근처 술집/바",    desc:"오늘 밤 분위기 좋은 곳",   bg:"#FFF8EB", accent:"#FBBF24" },
  ];

  let selected = null;

  function buildOptions() {
    const list = document.getElementById("optionsList");
    OPTIONS.forEach((opt, i) => {
      const card = document.createElement("div");
      card.className = "option-card";
      card.id = `card-${i}`;
      card.style.setProperty("--bg", opt.bg);
      card.style.setProperty("--accent", opt.accent);
      card.style.setProperty("--accent-light", opt.accent + "55");
      card.style.animation = `slideIn .4s ease-out ${i * 0.07 + 0.05}s both`;
      card.innerHTML = `
        <div class="option-emoji-box" style="background:${opt.bg}">${opt.emoji}</div>
        <div style="flex:1">
          <div class="option-title">${opt.title}</div>
          <div class="option-desc">${opt.desc}</div>
        </div>
        <div class="option-arrow">›</div>
      `;
      card.addEventListener("click", () => toggleCard(i));
      list.appendChild(card);
    });
  }

  function toggleCard(i) {
    const prev = selected;
    selected = (selected === i) ? null : i;
    if (prev !== null) document.getElementById(`card-${prev}`).classList.remove("active");
    if (selected !== null) document.getElementById(`card-${selected}`).classList.add("active");
  }

  function goMain() {
    document.getElementById("splash").style.display = "none";
    document.getElementById("splash-bar").style.display = "none";
    const main = document.getElementById("main");
    main.classList.add("active");
    buildOptions();
  }
</script>
</body>
</html>
